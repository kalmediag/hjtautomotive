<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google" content="notranslate">
  <title>HJTAUTOMOTIVE Aston Martin Valhalla</title>
  <link rel="stylesheet" href="./styles/main.css">
</head>
<body class="category-page">
  <header class="site-header">
    <nav class="nav" aria-label="Primary navigation">
      <a class="brand notranslate" href="./index.html#home" translate="no">HJTAUTOMOTIVE</a>
      <button class="menu-toggle" type="button" aria-expanded="false" aria-controls="site-menu" aria-label="Open menu">
        <span></span>
        <span></span>
      </button>
      <div class="menu" id="site-menu">
        <a href="./index.html#home">Home</a>
        <a href="./work.html">Work</a>
        <a href="./index.html#contact">Contact</a>
      </div>
    </nav>
  </header>
  <main class="page-main">
    <section class="category-shell">
      <article class="category-hero-card">
        <div class="category-copy">
          <p class="category-kicker">Project One</p>
          <h1 class="category-title">Aston Martin Valhalla</h1>
          <p class="category-description">A focused gallery for Aston Martin Valhalla presentation work, pairing brand-led assets with premium automotive stills.</p>
          <div class="category-actions">
            <a class="ghost-button" href="./aston-martin.html">Back to Projects</a>
          </div>
        </div>
        <div class="category-hero-media">
          <img src="./assets/optimized/Automotive/Porsche%20997.jpg" alt="Aston Martin Valhalla hero image" decoding="async" fetchpriority="high">
        </div>
      </article>

      <section class="project-showcase category-gallery" aria-label="Aston Martin Valhalla gallery">
        <div class="gallery-grid" data-gallery-key="aston-martin-valhalla">
          <figure class="gallery-card"><img loading="lazy" decoding="async" fetchpriority="high" src="./assets/SVG/valhalla.svg" alt="Aston Martin Valhalla mark"></figure>
          <figure class="gallery-card"><img loading="lazy" decoding="async" fetchpriority="low" src="./assets/optimized/Automotive/Porsche%20997.jpg" alt="Aston Martin Valhalla image 1"></figure>
          <figure class="gallery-card"><img loading="lazy" decoding="async" fetchpriority="low" src="./assets/optimized/Automotive/Dream%20Shot%20E30%20&%20964.jpg" alt="Aston Martin Valhalla image 2"></figure>
          <figure class="gallery-card"><img loading="lazy" decoding="async" fetchpriority="low" src="./assets/optimized/Automotive/Porsche%20964%2009%2014-10-24.jpg" alt="Aston Martin Valhalla image 3"></figure>
        </div>
      </section>
    </section>
  </main>
  <script src="./scripts/main.js"></script>
</body>
</html>
