<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google" content="notranslate">
  <title>HJTAUTOMOTIVE Work</title>
  <link rel="stylesheet" href="./styles/main.css">
</head>
<body class="work-page">
  <header class="site-header">
    <nav class="nav" aria-label="Primary navigation">
      <a class="brand notranslate" href="./index.html#home" translate="no">HJTAUTOMOTIVE</a>
      <button class="menu-toggle" type="button" aria-expanded="false" aria-controls="site-menu" aria-label="Open menu">
        <span></span>
        <span></span>
      </button>
      <div class="menu" id="site-menu">
        <a href="./index.html#home">Home</a>
        <a href="./work.html">Work</a>
        <a href="./index.html#contact">Contact</a>
      </div>
    </nav>
  </header>

  <main class="page-main">
    <section class="showcase-section" aria-label="Showcase">
      <div class="showcase-stage automotive-showcase" data-showcase-stage>
        <article
          class="showcase-tile showcase-tile-wide"
          data-tile-key="others"
          tabindex="0"
          role="link"
          data-href="./aston-martin.html"
          data-title="Aston Martin Newcastle"
          data-category="Category One"
          data-note="Commissioned automotive imagery and dealership-led visual work presented under Aston Martin Newcastle."
          data-popup-side="right"
        >
          <img src="./assets/optimized/Automotive/Porsche%20997.jpg" alt="Aston Martin Newcastle showcase" decoding="async" fetchpriority="high">
          <span class="showcase-tile-label">Aston Martin Newcastle</span>
        </article>

        <article
          class="showcase-tile showcase-tile-tall"
          data-tile-key="automotive"
          tabindex="0"
          role="link"
          data-href="./automotive.html"
          data-title="Automotive"
          data-category="Category Two"
          data-note="Cars, transport, and automotive-focused image work pulled from the Automotive collection."
          data-popup-side="right"
        >
          <img src="./assets/optimized/Automotive/DSC08637.jpg" alt="Automotive showcase" decoding="async" fetchpriority="high">
          <span class="showcase-tile-label">Automotive</span>
        </article>

        <article
          class="showcase-tile showcase-tile-center"
          data-tile-key="pets"
          tabindex="0"
          role="link"
          data-href="./pets.html"
          data-title="Pets"
          data-category="Category Three"
          data-note="Pet and dog photography drawn directly from the Dogs folder in your photo library."
          data-popup-side="left"
        >
          <img src="./assets/optimized/Dogs/Poppy%20At%20Sunset.jpg" alt="Dogs showcase" decoding="async" fetchpriority="high">
          <span class="showcase-tile-label">Pets</span>
        </article>

        <article
          class="showcase-tile showcase-tile-square"
          data-tile-key="landscape"
          tabindex="0"
          role="link"
          data-href="./landscape.html"
          data-title="Landscape"
          data-category="Category Four"
          data-note="Wider environmental scenes and atmospheric work selected from the Landscape folder."
          data-popup-side="left"
        >
          <img src="./assets/optimized/Landscape/South%20Shields%20Beach%20With%20Wooden%20Posts%20%202.jpg" alt="Landscape showcase" decoding="async" fetchpriority="high">
          <span class="showcase-tile-label">Landscape</span>
        </article>

        <article
          class="showcase-tile showcase-tile-low"
          data-tile-key="travel"
          tabindex="0"
          role="link"
          data-href="./travel.html"
          data-title="Travel"
          data-category="Category Five"
          data-note="Travel scenes and location-led imagery selected from the Travel folder."
          data-popup-side="left"
        >
          <img src="./assets/optimized/Travel/PA266356.jpg" alt="Travel showcase" decoding="async" fetchpriority="high">
          <span class="showcase-tile-label">Travel</span>
        </article>

        <article
          class="showcase-tile showcase-tile-left-low"
          data-tile-key="wildlife"
          tabindex="0"
          role="link"
          data-href="./wildlife.html"
          data-title="Wildlife"
          data-category="Category Six"
          data-note="Nature and wildlife imagery drawn from the Wildlife folder in your image library."
          data-popup-side="right"
        >
          <img src="./assets/optimized/Wildlife/P7141241-Enhanced-NR.jpg" alt="Wildlife showcase" decoding="async" fetchpriority="high">
          <span class="showcase-tile-label">Wildlife</span>
        </article>

        <div class="showcase-popup" data-showcase-popup aria-hidden="true">
          <p class="showcase-popup-kicker" data-popup-category></p>
          <h2 data-popup-title></h2>
          <p class="showcase-popup-note" data-popup-note></p>
        </div>
      </div>
    </section>
  </main>

  <script src="./scripts/main.js"></script>
</body>
</html>
